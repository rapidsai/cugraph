name: test
on:
  workflow_dispatch:
    inputs:
      branch:
        description: |
          branch: git branch the workflow run targets.
          Required even when 'sha' is provided because it is also used for organizing artifacts.
        required: true
        type: string
      date:
        description: "date: Date (YYYY-MM-DD) this run is for. Used to organize artifacts produced by nightly builds"
        required: true
        type: string
      sha:
        description: "sha: full git commit SHA to check out"
        required: true
        type: string
      build_type:
        description: "build_type: one of [branch, nightly, pull-request]"
        type: string
        default: nightly
permissions: {}
jobs:
  conda-cpp-checks:
    uses: rapidsai/shared-workflows/.github/workflows/conda-cpp-post-build-checks.yaml@main
    with:
      build_type: ${{ inputs.build_type }}
      branch: ${{ inputs.branch }}
      date: ${{ inputs.date }}
      sha: ${{ inputs.sha }}
      symbol_exclusions: (cugraph::ops|hornet|void writeEdgeCountsKernel|void markUniqueOffsetsKernel)
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: read
      pull-requests: read
  conda-cpp-tests:
    secrets: inherit # zizmor: ignore[secrets-inherit]
    uses: rapidsai/shared-workflows/.github/workflows/conda-cpp-tests.yaml@main
    with:
      build_type: ${{ inputs.build_type }}
      branch: ${{ inputs.branch }}
      date: ${{ inputs.date }}
      script: ci/test_cpp.sh
      sha: ${{ inputs.sha }}
      # TODO(#5498): Drop this filter once libcugraph no longer requires a CUDA >= 12.8
      # cudart at runtime (ideally by statically linking libcudart again).
      matrix_filter: map(select(.CUDA_VER | split(".") | map(tonumber) >= [12, 9]))
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: read
      pull-requests: read
  conda-python-tests:
    secrets: inherit # zizmor: ignore[secrets-inherit]
    uses: rapidsai/shared-workflows/.github/workflows/conda-python-tests.yaml@main
    with:
      build_type: ${{ inputs.build_type }}
      branch: ${{ inputs.branch }}
      date: ${{ inputs.date }}
      script: ci/test_python.sh
      sha: ${{ inputs.sha }}
      # TODO(#5498): Drop this filter once libcugraph no longer requires a CUDA >= 12.8
      # cudart at runtime (ideally by statically linking libcudart again).
      matrix_filter: map(select(.CUDA_VER | split(".") | map(tonumber) >= [12, 9]))
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: read
      pull-requests: read
  wheel-tests-pylibcugraph:
    secrets: inherit # zizmor: ignore[secrets-inherit]
    uses: rapidsai/shared-workflows/.github/workflows/wheels-test.yaml@main
    with:
      build_type: ${{ inputs.build_type }}
      branch: ${{ inputs.branch }}
      date: ${{ inputs.date }}
      sha: ${{ inputs.sha }}
      script: ci/test_wheel_pylibcugraph.sh
      # TODO(#5498): Drop this filter once libcugraph no longer requires a CUDA >= 12.8
      # cudart at runtime (ideally by statically linking libcudart again).
      matrix_filter: map(select(.CUDA_VER | split(".") | map(tonumber) >= [12, 9]))
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: read
      pull-requests: read
  wheel-tests-cugraph:
    secrets: inherit # zizmor: ignore[secrets-inherit]
    uses: rapidsai/shared-workflows/.github/workflows/wheels-test.yaml@main
    with:
      build_type: ${{ inputs.build_type }}
      branch: ${{ inputs.branch }}
      date: ${{ inputs.date }}
      sha: ${{ inputs.sha }}
      script: ci/test_wheel_cugraph.sh
      # TODO(#5498): Drop this filter once libcugraph no longer requires a CUDA >= 12.8
      # cudart at runtime (ideally by statically linking libcudart again).
      matrix_filter: map(select(.CUDA_VER | split(".") | map(tonumber) >= [12, 9]))
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: read
      pull-requests: read
